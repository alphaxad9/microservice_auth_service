name: Build and Push Auth Service Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: auth-service-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: auth-service
  REGISTRY: ghcr.io

jobs:

  test:
    runs-on: ubuntu-latest
    
    env:
      DJANGO_SECRET_KEY: django-insecure-test-key-for-ci-only-not-for-prod
      DJANGO_DEBUG: 'True'
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      
      POSTGRES_ENGINE: django.db.backends.sqlite3
      POSTGRES_DB: ':memory:'
      POSTGRES_HOST: ''
      POSTGRES_PORT: ''
      POSTGRES_USER: ''
      POSTGRES_PASSWORD: ''

      SIGNING_KEY: |
        -----BEGIN PRIVATE KEY-----
        TEST_KEY_REMOVED_FOR_BREVITY
        -----END PRIVATE KEY-----

      VERIFYING_KEY: |
        -----BEGIN PUBLIC KEY-----
        TEST_KEY_REMOVED_FOR_BREVITY
        -----END PUBLIC KEY-----

      RABBITMQ_HOST: ''
      KAFKA_BROKERS: ''
      REDIS_URL: ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-django

      - name: Run tests
        run: |
          pytest --cov=src --cov-report=xml -v --tb=short --ds=my_backend.settings


  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          load: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ⭐ THIS IS THE CRITICAL FIX
      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          github-pat: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif
