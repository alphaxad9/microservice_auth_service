name: Build and Push Auth Service Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: auth-service-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: auth-service
  REGISTRY: ghcr.io

jobs:

  test:
    runs-on: ubuntu-latest
    
    # Environment variables for testing (SQLite + test keys)
    env:
