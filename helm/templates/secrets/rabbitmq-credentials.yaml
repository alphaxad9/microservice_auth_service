apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.rabbitmq }}
  labels:
    app: rabbitmq
    app.kubernetes.io/component: message-broker
type: Opaque
stringData:
  RABBITMQ_USER: {{ .Values.config.auth.rabbitmqUser | default "ishimwe" | quote }}
  RABBITMQ_PASS: {{ .Values.config.auth.rabbitmqPass | default "changeme" | quote }}
  RABBITMQ_DEFAULT_VHOST: {{ .Values.config.auth.rabbitmqVhost | default "microservice_one" | quote }}