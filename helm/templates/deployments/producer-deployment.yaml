apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-producer
  labels:
    app: auth-service
    component: producer
    managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.deployments.producer.replicas }}
  selector:
    matchLabels:
      app: auth-service
      component: producer
  template:
    metadata:
      labels:
        app: auth-service
        component: producer
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: auth-producer
        image: {{ .Values.backend.auth.image.repository }}:{{ .Values.backend.auth.image.producerTag }}
        imagePullPolicy: {{ .Values.backend.auth.image.pullPolicy }}
        command: ["python", "manage.py", "run_kafka_publisher"]
        envFrom:
        - configMapRef:
            name: {{ .Values.configMap.name }}
        - secretRef:
            name: {{ .Values.secrets.auth }}
        - secretRef:
            name: {{ .Values.secrets.postgres }}
        - secretRef:
            name: {{ .Values.secrets.rabbitmq }}
        - secretRef:
            name: {{ .Values.secrets.kafka }}
        - secretRef:
            name: {{ .Values.secrets.redis }}
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: SERVICE_COMPONENT
          value: "producer"
        resources:
          requests:
            memory: {{ .Values.deployments.producer.resources.requests.memory }}
            cpu: {{ .Values.deployments.producer.resources.requests.cpu }}
          limits:
            memory: {{ .Values.deployments.producer.resources.limits.memory }}
            cpu: {{ .Values.deployments.producer.resources.limits.cpu }}
        volumeMounts:
        - name: keys
          mountPath: /app/keys
          readOnly: true
      volumes:
      - name: keys
        secret:
          secretName: {{ .Values.secrets.auth }}
          items:
          - key: SIGNING_KEY
            path: private.pem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000