apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm.appname" (dict "ctx" $ "svc" "auth") }}
  labels:
    app: {{ include "helm.appname" (dict "ctx" $ "svc" "auth") }}
spec:
  selector:
    app: {{ include "helm.appname" (dict "ctx" $ "svc" "auth") }}
  ports:
    - protocol: TCP
      port: {{ .Values.backend.auth.port }}
      targetPort: {{ .Values.backend.auth.port }}
  type: ClusterIP