apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm.appname" (dict "ctx" $ "svc" "auth") }}
  labels:
    app: {{ include "helm.appname" (dict "ctx" $ "svc" "auth") }}
    app.kubernetes.io/component: auth-service

data:
  # Django Core
  DJANGO_SETTINGS_MODULE: {{ .Values.config.auth.djangoSettingsModule | quote }}
  DJANGO_DEBUG: {{ .Values.config.auth.djangoDebug | quote }}
  DJANGO_ALLOWED_HOSTS: {{ .Values.config.auth.djangoAllowedHosts | quote }}
  DJANGO_LANGUAGE_CODE: {{ .Values.config.auth.djangoLanguageCode | quote }}
  DJANGO_TIME_ZONE: {{ .Values.config.auth.djangoTimeZone | quote }}
  DEFAULT_FROM_EMAIL: {{ .Values.config.auth.defaultFromEmail | quote }}
  LOG_LEVEL: {{ .Values.config.auth.logLevel | quote }}
  
  # Server
  PORT: {{ .Values.backend.auth.port | quote }}
  
  # Database
  POSTGRES_ENGINE: {{ .Values.config.auth.postgresEngine | quote }}
  POSTGRES_HOST: {{ .Values.config.auth.postgresHost | quote }}
  POSTGRES_PORT: {{ .Values.config.auth.postgresPort | quote }}
  POSTGRES_DB: {{ .Values.config.auth.postgresDb | quote }}
  
  # Auth URLs
  AUTH_SERVICE_URL: {{ .Values.config.auth.authServiceUrl | quote }}
  AUTH_PUBLIC_KEY_URL: {{ .Values.config.auth.authPublicKeyUrl | quote }}
  WALLET_SERVICE: {{ .Values.config.auth.walletService | quote }}
  
  # ✅ Public Key (safe for ConfigMap)
  VERIFYING_KEY: |
    -----BEGIN PUBLIC KEY-----
    MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAvK5+ZjVe5LOWwAgScnFu
    r+xgOs13PHJmMKyDqV624PhScHcemyGaprT+imX42fgNCZ+ZqX1qYHaXQ9q9iAPD
    kzAOZZhN1X/Io5JY3/RSpEZqXobtn6I3n51jYFaxqjyKD6oaWL5OsMOOISmOs2q0
    tg/4gI/tYhX9U1acJgRR7/NdH1YjAJh080ML2CVkZnEcvvary2YcPa93ft/zHvLQ
    u2Fglwr1eTWRcgE3b4dYx5XUBJghuA+Efkbn+rkJXJqfsksdb/PmbgctYjknRFAw
    iZQAgS+kybDx9Isi6SiMDaowjqKaYKrf86sOkq+boFUbPY8HekKCMaoD8c6aF4sj
    qwIDAQAB
    -----END PUBLIC KEY-----
  
  # RabbitMQ
  RABBITMQ_HOST: {{ .Values.config.auth.rabbitmqHost | quote }}
  RABBITMQ_PORT: {{ .Values.config.auth.rabbitmqPort | quote }}
  RABBITMQ_QUEUE: {{ .Values.config.auth.rabbitmqQueue | quote }}
  RABBITMQ_VHOST: {{ .Values.config.auth.rabbitmqVhost | quote }}
  
  # Kafka
  KAFKA_BROKERS: {{ .Values.config.auth.kafkaBrokers | quote }}
  KAFKA_TOPIC: {{ .Values.config.auth.kafkaTopic | quote }}
  KAFKA_GROUP_ID: {{ .Values.config.auth.kafkaGroupId | quote }}
  KAFKA_SECURITY_PROTOCOL: {{ .Values.config.auth.kafkaSecurityProtocol | quote }}
  KAFKA_ENABLE_AUTO_COMMIT: {{ .Values.config.auth.kafkaEnableAutoCommit | quote }}
  KAFKA_AUTO_OFFSET_RESET: {{ .Values.config.auth.kafkaAutoOffsetReset | quote }}
  
  # Redis
  REDIS_HOST: {{ .Values.config.auth.redisHost | quote }}
  REDIS_PORT: {{ .Values.config.auth.redisPort | quote }}
  REDIS_DB: {{ .Values.config.auth.redisDb | quote }}
  REDIS_SOCKET_TIMEOUT: {{ .Values.config.auth.redisSocketTimeout | quote }}
  REDIS_CONNECT_TIMEOUT: {{ .Values.config.auth.redisConnectTimeout | quote }}
  REDIS_RETRY_ON_TIMEOUT: {{ .Values.config.auth.redisRetryOnTimeout | quote }}
  
  # Cache TTLs
  LIKES_CACHE_TTL: {{ .Values.config.auth.likesCacheTtl | quote }}
  AUTHOR_TIMELINE_CACHE_TTL: {{ .Values.config.auth.authorTimelineCacheTtl | quote }}
  
  # Channel Layers
  CHANNEL_LAYER_HOSTS: {{ .Values.config.auth.channelLayerHosts | quote }}
  CHANNEL_LAYER_CAPACITY: {{ .Values.config.auth.channelLayerCapacity | quote }}
  CHANNEL_LAYER_EXPIRY: {{ .Values.config.auth.channelLayerExpiry | quote }}
  
  # ✅ CORS Settings
  CORS_ALLOWED_ORIGINS: {{ .Values.config.auth.corsAllowedOrigins | quote }}
  CSRF_TRUSTED_ORIGINS: {{ .Values.config.auth.csrfTrustedOrigins | quote }}
  CORS_ALLOW_CREDENTIALS: {{ .Values.config.auth.corsAllowCredentials | quote }}