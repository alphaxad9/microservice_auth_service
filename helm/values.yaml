# ============================================
# AUTH SERVICE HELM CHART - COMPLETE VALUES
# ============================================

# Namespace configuration
namespace: auth-service

# Service configuration
service:
  name: auth-service
  port: 8000

# ConfigMap name (used by all deployments)
configMap:
  name: auth-config

# ============================================
# DEPLOYMENTS CONFIGURATION
# ============================================
deployments:
  api:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  
  consumer:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"
  
  producer:
    replicas: 1
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

# ============================================
# BACKEND CONFIGURATION
# ============================================
backend:
  auth:
    image:
      repository: alphaxad9/auth-service
      tag: "0.1.5"          # API and Producer version
      consumerTag: "0.0.8"   # Consumer version (different)
      producerTag: "0.1.5"   # Producer version
      pullPolicy: IfNotPresent
    port: 8000

# ============================================
# CONFIGURATION VALUES (for ConfigMap)
# ============================================
config:
  auth:
    # Django Core
    serviceName: "auth"
    djangoSettingsModule: "my_backend.settings"
    djangoDebug: "True"
    djangoAllowedHosts: "auth-service,auth-service.auth-service.svc.cluster.local,localhost,127.0.0.1,auth.local,172.18.0.100"
    djangoLanguageCode: "en-us"
    djangoTimeZone: "UTC"
    defaultFromEmail: "noreply@example.com"
    logLevel: "DEBUG"
    
    # Database
    postgresEngine: "django.db.backends.postgresql"
    postgresHost: "postgres.infrastructure.svc.cluster.local"
    postgresPort: "5432"
    postgresDb: "authdb"
    dbHost: "postgres.infrastructure.svc.cluster.local"
    dbPort: "5432"
    dbName: "authdb"
    
    # RabbitMQ
    rabbitmqHost: "rabbitmq.infrastructure.svc.cluster.local"
    rabbitmqPort: "5672"
    rabbitmqQueue: "auth.events"
    rabbitmqVhost: "auth_service"
    
    # Kafka
    kafkaBrokers: "kafka-cluster-kafka-bootstrap.kafka-operator.svc.cluster.local:9092"
    kafkaTopic: "microservice_one.events"
    kafkaGroupId: "auth_consumer_group"
    kafkaSecurityProtocol: "PLAINTEXT"
    kafkaEnableAutoCommit: "false"
    kafkaAutoOffsetReset: "earliest"
    
    # Redis
    redisHost: "redis.infrastructure.svc.cluster.local"
    redisPort: "6379"
    redisDb: "0"
    redisSocketTimeout: "2"
    redisConnectTimeout: "2"
    redisRetryOnTimeout: "true"
    
    # Cache TTLs
    likesCacheTtl: "300"
    authorTimelineCacheTtl: "120"
    
    # Channel Layers
    channelLayerHosts: "redis.infrastructure.svc.cluster.local:6379"
    channelLayerCapacity: "1000"
    channelLayerExpiry: "10"
    
    # CORS Settings
    corsAllowedOrigins: "http://localhost:3000,http://172.18.0.100,http://127.0.0.1:3000"
    csrfTrustedOrigins: "http://localhost:3000,http://172.18.0.100,http://127.0.0.1:3000"
    corsAllowCredentials: "True"
    
    # Auth Public Key URL
    authPublicKeyUrl: "http://auth-service.auth-service.svc.cluster.local:8000/zedvye_one/users/public_key/"

# ============================================
# SECRETS CONFIGURATION
# ============================================
secrets:
  # Secret resource names
  auth: auth-secrets
  postgres: postgres-credentials
  rabbitmq: rabbitmq-credentials
  kafka: kafka-credentials
  redis: redis-credentials
  
  # Secret data values
  data:
    rabbitmq:
      user: "ishimwe"
      pass: "GA4xdr2K1hbUdJgB1DOJXsUOq0WK6koXZy3M9ATy7Ec="
      erlangCookie: "secure-cookie-for-cluster"
    
    redis:
      password: "dev-redis-password"
    
    postgres:
      user: "ishimwe"
      password: "2025New+"
    
    auth:
      djangoSecretKey: "django-insecure-change-me-in-prod"
      internalApiKey: "change-me"
      serviceJwt: "change-me"
      # Keys are handled via defaults in the template

# ============================================
# PERSISTENCE CONFIGURATION
# ============================================
persistence:
  enabled: true
  static:
    size: 5Gi
  media:
    size: 10Gi

# ============================================
# INGRESS CONFIGURATION
# ============================================
ingress:
  enabled: true
  host: auth.local

# ============================================
# SERVICE ACCOUNT CONFIGURATION
# ============================================
serviceAccount:
  create: true
  name: auth-service-sa
  automount: true
  annotations: {}

# ============================================
# MISC CONFIGURATION
# ============================================
replicaCount: 1

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Node configuration
nodeSelector: {}
tolerations: []
affinity: {}

# HTTPRoute (if using Gateway API)
httpRoute:
  enabled: false